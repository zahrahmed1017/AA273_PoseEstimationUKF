ROOT: '/Users/Zahra1/Documents/Stanford/Classes/AA273/FinalProject/slab-spn'
OUTPUT_DIR: 'output'
LOG_DIR:    'log'
SEED: 2023
AUTO_RESUME: True
CUDA: True
AMP:  True
AMP_DTYPE: 'bfloat16'
TF32: False
VERBOSE: True    # Will put logger to DEBUG mode
EXP_NAME: 'baseline'

DIST:
  MULTIPROCESSING_DISTRIBUTED: False
  BACKEND: 'nccl'
  RANK: 1

CUDNN:
  BENCHMARK: True
  DETERMINISTIC: False
  ENABLED: True

DATASET:
  ROOT: '/Users/Zahra1/Documents/Stanford/Research/datasets'
  DATANAME: 'shirtv1'
  CAMERA: 'camera.json'
  KEYPOINTS: 'models/tango/tangoPoints.mat' # w.r.t. DATASET.ROOT
  CADMODEL:  'models/tango/tango.ply'       # w.r.t. DATASET.ROOT
  IMAGE_SIZE: [1920, 1200]
  INPUT_SIZE: [256, 256]
  IS_RGB:     False
  IMAGE_EXT:  'jpg'
  MASK_EXT:   'jpg'
  OUTPUT_SCALE: 4
  SIGMA: 1

AUGMENT:
  NUM_RANDAUGMENT:    5
  APPLY_STYLEAUGMENT: False
  APPLY_DEEPAUGMENT:  False
  APPLY_RANDCONV:     False

TRAIN:
  TRAIN_CSV: ['roe2/synthetic/labels/roe2.csv']
  VAL_CSV:   ['roe2/lightbox/labels/roe2.csv']
  BEGIN_EPOCH: 0
  END_EPOCH: 30
  WARMUP_EPOCH: 1
  VALID_FREQ: 1
  VALID_FRACTION: 0.1   # (0, 1]
  IMAGES_PER_GPU: 32
  OPTIMIZER: AdamW
  LR: 1.0e-3
  SCHEDULER: 'cosine'
  DECAY_UNIT: 'step'
  GAMMA1: 0.9
  GAMMA2: 0.999
  WD: 1.0e-4
  EPS: 1.0e-5
  CLIP_FACTOR: 1.0
  WORKERS: 16
  SAVE_MODEL_EVERY_EPOCH: False

TEST:
  TEST_CSV: ['roe2/labels/validation.csv']
  # TEST_CSV: ['lightbox/labels/test.csv']
  # TEST_CSV: ['synthetic/labels/labels_2000_random_pose_validation_notspeed.csv']
  IMAGES_PER_GPU: 1
  HEAD: ['heatmap']
  UDP: True
  EXCLUDE_REJECT: True
  MODEL_FILE: 'model_best.pth.tar'
  WRITE_PER_SAMPLE_PERF: True

MODEL:
  BACKBONE_NAME: "efficientnet_b0_bn"
  CHANNELS_LAST: False
  LOAD_IMAGENET_PRETRAIN: False
  LOSS:
    NAMES: ['heatmap']
    FACTORS: [1.0]
    HEATMAP: "mse" # "mse" or "awing"